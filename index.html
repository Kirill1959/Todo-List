<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Список дел</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>📝 Мои задачи</h1>

      <div class="input-area">
        <input
          type="text"
          id="taskInput"
          placeholder="Введите новую задачу..."
          maxlength="100"
        />
        <button id="addBtn">Добавить</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="active">Активные</button>
        <button class="filter-btn" data-filter="done">Выполненные</button>
      </div>

      <ul id="taskList"></ul>

      <div class="footer">
        <span id="taskCount">0 задач осталось</span>
        <button id="clearDoneBtn">Очистить выполненные</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
