<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Список дел</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>📝 Мои задачи</h1>

      <!-- Статистика -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="statTotal">0</div>
          <div class="stat-label">Всего</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statActive">0</div>
          <div class="stat-label">Активных</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statDone">0</div>
          <div class="stat-label">Выполнено</div>
        </div>
      </div>

      <!-- Фильтры -->
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="active">Активные</button>
        <button class="filter-btn" data-filter="done">Выполненные</button>
      </div>

      <!-- Список задач -->
      <ul id="taskList"></ul>
    </div>

    <!-- Фиксированная панель снизу -->
    <div class="bottom-bar">
      <div class="bottom-bar-inner">
        <div class="input-area">
          <input
            type="text"
            id="taskInput"
            placeholder="Введите новую задачу..."
            maxlength="100"
          />
          <button id="addBtn">Добавить</button>
        </div>
        <div class="bottom-actions">
          <span id="taskCount">0 задач осталось</span>
          <div class="danger-btns">
            <button class="clear-btn" id="clearDoneBtn">Очистить выполненные</button>
            <button class="clear-btn" id="clearAllBtn">Очистить всё</button>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
