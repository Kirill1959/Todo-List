<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Список дел</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>📝 Мои задачи</h1>

      <!-- Статистика -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="statTotal">0</div>
          <div class="stat-label">Всего</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statActive">0</div>
          <div class="stat-label">Активных</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statDone">0</div>
          <div class="stat-label">Выполнено</div>
        </div>
      </div>

      <!-- Фильтры -->
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="active">Активные</button>
        <button class="filter-btn" data-filter="done">Выполненные</button>
      </div>

      <!-- Сортировка -->
      <div class="sort-row">
        <span class="sort-label">Сортировка:</span>
        <select id="sortSelect">
          <option value="newest">Сначала новые</option>
          <option value="oldest">Сначала старые</option>
          <option value="az">По алфавиту А→Я</option>
          <option value="za">По алфавиту Я→А</option>
        </select>
      </div>

      <!-- Список задач -->
      <ul id="taskList"></ul>
    </div>

    <!-- Фиксированная панель снизу -->
    <div class="bottom-bar">
      <div class="bottom-bar-inner">
        <div class="input-area">
          <input
            type="text"
            id="taskInput"
            placeholder="Введите новую задачу..."
            maxlength="100"
          />
          <button id="addBtn">Добавить</button>
        </div>
        <div class="action-btns">
          <button class="action-btn danger" id="clearDoneBtn">🗑 Очистить выполненные</button>
          <button class="action-btn neutral" id="clearAllBtn">✕ Очистить всё</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
